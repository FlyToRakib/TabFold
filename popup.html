<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">TabFold</div>
      <button id="settingsBtn" title="Settings" class="icon-btn">⚙️</button>
    </div>
    <hr class="header-divider">
    <div class="tagline">One-click tab management. Organize, group,<br>export, and suspend tabs to save memory and focus.</div>
  </header>

  <main>
    <div class="grid-actions">
      <button id="groupTabsBtn" class="action-btn">Group by Domain</button>
      <button id="suspendOthersBtn" class="action-btn">Suspend Inactive</button>
      <button id="destroyDupsBtn" class="action-btn">Close Duplicates</button>
    </div>

    <div id="popupSessionsSection" class="hidden">
      <hr class="session-divider">
      <ul id="popupSessionsList" class="scrollable-list"></ul>
    </div>

    <hr>

    <div class="io-section">
      <div class="io-controls">
        <select id="exportFormat">
          <option value="markdown">Markdown</option>
          <option value="text">Plain Text</option>
          <option value="csv">CSV</option>
          <option value="html">HTML</option>
        </select>
        <div class="action-row">
          <button id="exportBtn" class="action-btn">Copy Out</button>
          <button id="importBtn" class="action-btn">Paste & Open</button>
        </div>
      </div>
      <textarea id="ioArea" placeholder="URLs will appear here, or paste a list of URLs to open them..."></textarea>
    </div>
    <div id="statusMessage" class="hidden"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
